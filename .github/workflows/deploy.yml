name: CI-CD

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Run backend linter
        working-directory: backend
        run: flake8 .

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test

      - name: Run frontend quality check
        run: npm run lint:frontend

      - name: Build frontend image
        run: docker build -f frontend.Dockerfile -t privacyguard-frontend .

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t privacyguard-backend ./backend

  e2e:
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: true
          VITE_API_URL: http://127.0.0.1:8000
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [quality-checks, e2e]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment placeholder
        run: echo "Deploy step should run here after successful checks"